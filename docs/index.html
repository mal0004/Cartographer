<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartographer — World Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ─── Home screen ─────────────────────────────────── -->
  <div id="home-screen" class="screen active">
    <section class="hero">
      <svg class="hero-map-bg" id="hero-map-bg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
      <div class="hero-content">
        <h1 class="hero-title">Cartographer</h1>
        <p class="hero-tagline">Fictional World Map Editor</p>
        <div class="home-actions">
          <button id="btn-new-world" class="btn btn-cta-primary">+ Nouveau monde</button>
          <a href="#templates-section" class="btn btn-cta-outline">Voir les templates</a>
          <label class="btn btn-cta-outline">
            Importer JSON
            <input type="file" id="import-file" accept=".json" hidden>
          </label>
        </div>
      </div>
      <div class="scroll-indicator" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </section>

    <section class="home-section" id="worlds-section">
      <h2 class="section-title">Mes mondes</h2>
      <div id="worlds-grid" class="worlds-grid"></div>
    </section>

    <section class="home-section" id="templates-section">
      <h2 class="section-title">Partir d'un template</h2>
      <div id="templates-grid" class="templates-grid"></div>
    </section>

    <footer class="home-footer">
      <svg class="footer-compass" viewBox="0 0 60 60" width="40" height="40" aria-hidden="true">
        <g transform="translate(30,30)">
          <polygon points="0,-25 3,-8 -3,-8" fill="var(--accent)"/>
          <polygon points="0,25 3,8 -3,8" fill="var(--border)"/>
          <polygon points="-25,0 -8,3 -8,-3" fill="var(--border)"/>
          <polygon points="25,0 8,3 8,-3" fill="var(--border)"/>
          <circle r="3" fill="none" stroke="var(--accent)" stroke-width="1"/>
        </g>
      </svg>
      <p>Cartographer &mdash; MIT License</p>
    </footer>

    <!-- New world modal -->
    <div id="modal-new-world" class="modal" hidden>
      <div class="modal-content">
        <h2>Create a New World</h2>
        <label>Name<input type="text" id="new-world-name" placeholder="Middle-earth"></label>
        <label>Description<textarea id="new-world-desc" rows="3" placeholder="A brief description..."></textarea></label>
        <label>Timeline start<input type="number" id="new-world-tstart" value="0"></label>
        <label>Timeline end<input type="number" id="new-world-tend" value="1000"></label>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-create" class="btn btn-primary">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Editor screen ──────────────────────────────── -->
  <div id="editor-screen" class="screen">
    <div id="editor-topbar" class="editor-topbar">
      <button id="btn-back" class="btn-icon" title="Back to worlds">&larr;</button>
      <span id="world-title" class="world-title">World</span>
      <div class="topbar-right">
        <button id="btn-share" class="btn btn-sm">Partager</button>
        <button id="btn-export-svg" class="btn btn-sm">Export SVG</button>
        <button id="btn-export-json" class="btn btn-sm">Export JSON</button>
        <div class="theme-switcher">
          <button id="btn-toggle-theme" class="btn btn-sm" title="Thème">&#127912; Thème</button>
          <div id="theme-dropdown" class="theme-dropdown" hidden></div>
        </div>
        <button id="btn-golden-hour" class="btn btn-sm" title="Golden Hour lighting">&#9788; Golden Hour</button>
        <button id="btn-help" class="btn-icon" title="Aide / Tutoriel">?</button>
      </div>
    </div>

    <div id="editor-body" class="editor-body">
      <!-- Canvas area -->
      <div id="canvas-container" class="canvas-container">
        <canvas id="main-canvas"></canvas>

        <!-- Floating toolbar -->
        <div id="toolbar" class="toolbar">
          <button class="tool-btn active" data-tool="select" data-tooltip="Sélection — V">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51z" fill="currentColor"/></svg>
          </button>
          <button class="tool-btn" data-tool="territory" data-tooltip="Territoire — T">
            <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="12,2 22,20 2,20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="city" data-tooltip="Ville — C">
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>
          </button>
          <button class="tool-btn" data-tool="route" data-tooltip="Route — R">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 17c4-6 14-6 18 0" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="region" data-tooltip="Région — N">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2 20 L7 8 L12 14 L17 6 L22 20Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="river" data-tooltip="Rivière — W">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2c-1 4-4 6-4 10s2 6 0 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16 4c-1 3-3 5-3 8s1 5 0 8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="text" data-tooltip="Texte — X">
            <svg viewBox="0 0 24 24" width="20" height="20"><text x="6" y="18" font-size="18" font-weight="bold" fill="currentColor">A</text></svg>
          </button>
          <button class="tool-btn" data-tool="symbol" data-tooltip="Symboles — S">
            <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="12,2 15,9 23,9 17,14 19,22 12,18 5,22 7,14 1,9 9,9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <div class="tool-separator"></div>
          <button id="btn-snap" class="tool-btn active" title="Snap to elements (on)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
          </button>
          <button id="btn-grid-snap" class="tool-btn" title="Snap to grid (off)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 3h2v18H3V3zm16 0h2v18h-2V3zM3 3v2h18V3H3zm0 16v2h18v-2H3zm8-8h2v2h-2v-2z" fill="currentColor" opacity="0.6"/></svg>
          </button>
          <div class="tool-separator"></div>
          <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12.5 8C9.85 8 7.45 8.99 5.6 10.6L2 7v10h10l-3.6-3.6C9.68 12.05 11.05 11.5 12.5 11.5c3.31 0 6.13 2.13 7.14 5.1l2.86-.93C21.08 11.48 17.19 8 12.5 8z" fill="currentColor"/></svg>
          </button>
          <button id="btn-redo" class="tool-btn" title="Redo (Ctrl+Shift+Z)" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.69 0-8.58 3.48-9.14 7.67l2.86.93C6.37 13.63 9.19 11.5 12.5 11.5c1.45 0 2.82.55 4.1 1.4L13 16.5h10V6.5l-4.6 4.1z" fill="currentColor"/></svg>
          </button>
          <div class="tool-separator"></div>
          <input type="color" id="tool-color" value="#8B2635" title="Color">
        </div>

        <!-- Tool options bar (contextual) -->
        <div id="tool-options" class="tool-options" hidden>
          <!-- Populated dynamically per tool -->
        </div>
      </div>

      <!-- Sidebar -->
      <div id="sidebar" class="sidebar" hidden>
        <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
        <div class="sidebar-header">
          <h3 id="sidebar-title">Entity</h3>
          <button id="sidebar-close" class="btn-icon">&times;</button>
        </div>
        <div id="sidebar-content" class="sidebar-body"></div>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline" class="timeline collapsed">
      <div class="timeline-resize-handle" id="timeline-resize-handle"></div>
      <button id="timeline-toggle" class="timeline-toggle" title="Toggle timeline">&#9650; Timeline</button>
      <div id="timeline-body" class="timeline-body">
        <canvas id="timeline-canvas"></canvas>
        <button id="btn-add-event" class="btn btn-sm timeline-add">+ Event</button>
      </div>
    </div>
  </div>

  <script src="local-db.js"></script>
  <script src="noise.js"></script>
  <script src="terrain-renderer.js"></script>
  <script src="hill-shading.js"></script>
  <script src="coastlines.js"></script>
  <script src="rivers.js"></script>
  <script src="vegetation.js"></script>
  <script src="atmosphere.js"></script>
  <script src="responsive.js"></script>
  <script src="svg-export.js"></script>
  <script src="mode-toggle.js"></script>
  <script src="templates.js"></script>
  <script src="onboarding.js"></script>
  <script src="snap.js"></script>
  <script src="minimap.js"></script>
  <script src="themes.js"></script>
  <script src="undo.js"></script>
  <script src="layers.js"></script>
  <script src="symbols.js"></script>
  <script src="canvas.js"></script>
  <script src="sidebar.js"></script>
  <script src="timeline.js"></script>
  <script src="app.js"></script>
</body>
</html>
